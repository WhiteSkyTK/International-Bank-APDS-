# .github/workflows/devsecops.yml
#
# GlobalPay — DevSecOps Pipeline
# Uses ONLY free GitHub built-in tools. No external accounts needed.
#
#  CodeQL    → SAST  (finds vulnerabilities in your source code)
#  npm audit → SCA   (finds CVEs in your npm dependencies)
#  ESLint    → Code quality linting
#  Jest      → API security tests

name: GlobalPay DevSecOps Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:

  # ── 1. SAST — CodeQL (GitHub's own free scanner) ────────────────────────────
  codeql:
    name: SAST — CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ── 2. SCA — npm audit (free, built into npm) ────────────────────────────────
  dependency-scan:
    name: SCA — Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Audit backend dependencies
        working-directory: ./backend
        run: npm audit --audit-level=high

  # ── 3. Code Quality — ESLint ──────────────────────────────────────────────────
  lint:
    name: Code Quality — ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint src/ --ext .js,.jsx --max-warnings 0

  # ── 4. API Security Tests — Jest ─────────────────────────────────────────────
  api-tests:
    name: API Security Tests — Jest
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run security tests
        working-directory: ./backend
        env:
          MONGO_URI: mongodb://localhost:27017/globalpay_test
          JWT_SECRET: test-secret-ci
          NODE_ENV: test
        run: npm test

  # ── 5. Build Verification ─────────────────────────────────────────────────────
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build